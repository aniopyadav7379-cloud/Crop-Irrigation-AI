[pytest]
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --cov=preprocessing
    --cov=models
    --cov=utils
    --cov=api
    --cov-report=term-missing
    --cov-report=html:outputs/reports/coverage_html
markers =
    unit: fast unit tests with no I/O
    integration: tests requiring sample raster/vector fixtures
    slow: tests that train models or process large rasters
